version: "3.8"

services:
  xray:
    image: teddysun/xray:latest
    container_name: phoenix-xray
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/phoenix/configs/xray:/etc/xray:ro
    entrypoint: ["/usr/bin/xray"]
    command: ["-c", "/etc/xray/config.json"]

  hysteria:
    image: tobyxdd/hysteria:latest
    container_name: phoenix-hysteria
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/phoenix/configs/hysteria:/etc/hysteria:ro
      - /opt/phoenix/certs:/opt/phoenix/certs:ro
    entrypoint: ["hysteria"]
    command: ["server", "-c", "/etc/hysteria/config.yaml"]

  shadowsocks:
    image: shadowsocks/shadowsocks-libev:latest
    container_name: phoenix-ss
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/phoenix/configs/shadowsocks:/etc/shadowsocks:ro
    command: ss-server -c /etc/shadowsocks/config.json

  wireguard:
    image: linuxserver/wireguard:latest
    container_name: phoenix-wg
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=0
      - PGID=0
    volumes:
      - /opt/phoenix/configs/wireguard:/config
    network_mode: host
