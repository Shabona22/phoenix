{% extends "base.html" %}
{% block title %}{{ filename }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ protocol }} / {{ filename }}</h2>
    <div class="d-flex gap-2">
        <a href="{{ url_for('download_config', filepath=path) }}" class="btn btn-success btn-sm">دانلود</a>
        <a href="/" class="btn btn-outline-secondary btn-sm">بازگشت</a>
    </div>
</div>
<p class="text-muted"><code>{{ path }}</code></p>
<pre class="config-full">{{ content }}</pre>
{% endblock %}
